[project]
site_name = "DAMNIT Web API"
site_description = "DAMNIT Web API Documentation"
repo_url = "https://github.com/European-XFEL/DAMNIT-web"

nav = [
  "index.md",
  "deployment.md",
  "setup.md",
  "architecture.md",
  "security.md",
  "notes.md",
  "docs.md",
  "ci-cd.md",
  { "ADRs" = [
    "adr/README.md",
    "adr/000-vertical-slice-architecture.md",
  ] },
  # TODO: remove this once Zensical adds support/extensions
  # >>> BEGIN API-REFERENCE-NAV
  # Managed by scripts/gen_api_docs.py - run it to refresh.
  { "Reference" = [
    { "damnit_api" = [
      "reference/damnit_api/index.md",
      { "_db" = [
        "reference/damnit_api/_db/index.md",
        { "bootstrap" = "reference/damnit_api/_db/bootstrap.md" },
        { "dependencies" = "reference/damnit_api/_db/dependencies.md" },
        { "models" = "reference/damnit_api/_db/models.md" },
      ] },
      { "_logging" = "reference/damnit_api/_logging.md" },
      { "_mymdc" = [
        "reference/damnit_api/_mymdc/index.md",
        { "bootstrap" = "reference/damnit_api/_mymdc/bootstrap.md" },
        { "clients" = "reference/damnit_api/_mymdc/clients.md" },
        { "dependencies" = "reference/damnit_api/_mymdc/dependencies.md" },
        { "models" = "reference/damnit_api/_mymdc/models.md" },
        { "ports" = "reference/damnit_api/_mymdc/ports.md" },
        { "settings" = "reference/damnit_api/_mymdc/settings.md" },
        { "vendor" = [
          "reference/damnit_api/_mymdc/vendor/index.md",
          { "models" = "reference/damnit_api/_mymdc/vendor/models.md" },
        ] },
      ] },
      { "auth" = [
        "reference/damnit_api/auth/index.md",
        { "bootstrap" = "reference/damnit_api/auth/bootstrap.md" },
        { "dependencies" = "reference/damnit_api/auth/dependencies.md" },
        { "gql" = "reference/damnit_api/auth/gql.md" },
        { "models" = "reference/damnit_api/auth/models.md" },
        { "permissions" = "reference/damnit_api/auth/permissions.md" },
        { "routers" = "reference/damnit_api/auth/routers.md" },
      ] },
      { "contextfile" = [
        "reference/damnit_api/contextfile/index.md",
        { "models" = "reference/damnit_api/contextfile/models.md" },
        { "routers" = "reference/damnit_api/contextfile/routers.md" },
      ] },
      { "data" = "reference/damnit_api/data.md" },
      { "db" = "reference/damnit_api/db.md" },
      { "graphql" = [
        "reference/damnit_api/graphql/index.md",
        { "directives" = "reference/damnit_api/graphql/directives.md" },
        { "metadata" = "reference/damnit_api/graphql/metadata.md" },
        { "models" = "reference/damnit_api/graphql/models.md" },
        { "queries" = "reference/damnit_api/graphql/queries.md" },
        { "subscriptions" = "reference/damnit_api/graphql/subscriptions.md" },
        { "utils" = "reference/damnit_api/graphql/utils.md" },
      ] },
      { "main" = "reference/damnit_api/main.md" },
      { "metadata" = [
        "reference/damnit_api/metadata/index.md",
        { "gql" = "reference/damnit_api/metadata/gql.md" },
        { "models" = "reference/damnit_api/metadata/models.md" },
        { "routers" = "reference/damnit_api/metadata/routers.md" },
        { "services" = "reference/damnit_api/metadata/services.md" },
      ] },
      { "shared" = [
        "reference/damnit_api/shared/index.md",
        { "const" = "reference/damnit_api/shared/const.md" },
        { "errors" = "reference/damnit_api/shared/errors.md" },
        { "gql" = "reference/damnit_api/shared/gql.md" },
        { "models" = "reference/damnit_api/shared/models.md" },
        { "settings" = "reference/damnit_api/shared/settings.md" },
      ] },
      { "utils" = "reference/damnit_api/utils.md" },
    ] },
  ] },
  # <<< END API-REFERENCE-NAV
]

extra_css = ["stylesheets/mkdocstrings.css"]

[project.theme]
language = "en"
features = [
  "content.code.annotate",
  "content.code.copy",
  "navigation.indexes",
  "navigation.instant",
  "navigation.sections",
  "navigation.tabs",
  "navigation.top",
  "search.highlight",
]

[[project.theme.palette]]
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.toc]
permalink = true
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.superfences]
[project.markdown_extensions.pymdownx.snippets]
base_path = ["."]

[project.plugins.mkdocstrings.handlers.python]
paths = ["src"]
inventories = [
  "https://docs.python.org/3/objects.inv",
  "https://docs.pydantic.dev/latest/objects.inv",
  "https://python-dependency-injector.ets-labs.org/objects.inv",
]

[project.plugins.mkdocstrings.handlers.python.options]
docstring_section_style = "spacy"
docstring_style = "google"
heading_level = 1
inherited_members = true
merge_init_into_class = true
modernize_annotations = true
parameter_headings = true
separate_signature = true
show_bases = true
show_if_no_docstring = true
show_root_full_path = false
show_root_heading = true
show_signature_annotations = true
show_signature_type_parameters = true
show_symbol_type_heading = true
show_symbol_type_toc = true
signature_crossrefs = true
summary = true
type_parameter_headings = true
unwrap_annotated = true
