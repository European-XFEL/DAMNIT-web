name: Cleanup Pages

on:
  delete:
  pull_request:
    types: [closed]

permissions:
  contents: write

# All gh-pages writers share one group: they commit to the same branch, and
# git rejects a non-fast-forward push, so only one may run at a time. Do
# not give each workflow its own group; queue: max keeps the queue from
# dropping runs (the default cancels the pending one).
concurrency:
  group: gh-pages
  queue: max
  cancel-in-progress: false

jobs:
  cleanup-branch:
    if: github.event_name == 'delete' && github.event.ref_type == 'branch'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@v5
        with:
          ref: gh-pages

      - name: Remove branch folder
        shell: bash
        run: |
          BRANCH="${{ github.event.ref }}"
          SAFE="$(echo "$BRANCH" | tr '[:upper:]' '[:lower:]' | sed -E 's#[^a-z0-9._-]+#-#g')"
          DIR="branches/$SAFE"
          rm -rf "$DIR"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Remove Pages preview for deleted branch: $BRANCH" || exit 0
          git push

  cleanup-pr:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@v5
        with:
          ref: gh-pages

      - name: Remove PR folder
        shell: bash
        run: |
          PR="${{ github.event.pull_request.number }}"
          DIR="pull/$PR"
          rm -rf "$DIR"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Remove Pages preview for closed PR: #$PR" || exit 0
          git push
