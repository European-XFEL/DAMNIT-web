name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - "api/docs/**"
      - "api/README.md"
      - "api/src/**"
      - "api/zensical.toml"
      - "api/pyproject.toml"
      - "uv.lock"
      - ".github/workflows/deploy-docs.yml"
  workflow_dispatch:

permissions:
  contents: write

# All gh-pages writers share one group: they commit to the same branch, and
# git rejects a non-fast-forward push, so only one may run at a time. Do
# not give each workflow its own group; queue: max keeps the queue from
# dropping runs (the default cancels the pending one).
concurrency:
  group: gh-pages
  queue: max
  cancel-in-progress: false

jobs:
  build-and-deploy:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: api

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          python-version: "3.13"

      - name: Sync docs dependencies
        run: uv sync --locked --group docs

      - name: Build docs
        run: uv run --no-sync zensical build --clean

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./api/site
          destination_dir: docs/api
